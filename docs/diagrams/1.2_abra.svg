<svg width="1600" height="3320" viewBox="0 0 1600 3320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Beszélgetési szál · 6 egymásra épülő prompt</title>
  <desc id="desc">Vektoros ábra egy hat promptból álló beszélgetési szálról, azonos tematikai kategórián belüli szezonális megkötésekkel.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .ink { fill: #111418; }
      .muted { fill: #5b6470; }
      .muted2 { fill: #8a929c; }
      .rule { stroke: #111418; stroke-width: 2.5; fill: none; }
      .rule-soft { stroke: #c9ced4; stroke-width: 1.5; fill: none; }
      .rule-soft-2 { stroke: #e4e7ea; stroke-width: 1.25; fill: none; }
      .box { fill: #ffffff; stroke: #111418; stroke-width: 2; }
      .box-soft { fill: #ffffff; stroke: #5b6470; stroke-width: 1.5; }
      .box-tint { fill: #f3f4f2; stroke: #111418; stroke-width: 2; }
      .kicker { font-family: Inter, Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; fill: #5b6470; }
      .gutter-num { font-family: "Source Serif 4", Georgia, "Times New Roman", serif; font-size: 64px; font-weight: 700; fill: #111418; }
      .gutter-label { font-family: Inter, Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; fill: #5b6470; }
      .msg-label { font-family: Inter, Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; fill: #111418; }
      .msg-sub { font-family: "Source Serif 4", Georgia, "Times New Roman", serif; font-size: 22px; font-style: italic; fill: #5b6470; }
      .msg-body { font-family: "Source Serif 4", Georgia, "Times New Roman", serif; font-size: 26px; fill: #111418; }
      .seasonal-label { font-family: Inter, Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; fill: #5b6470; }
      .code { font-family: "JetBrains Mono", "Courier New", Courier, monospace; font-size: 22px; fill: #2a2f36; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="3320"/>

  <line class="rule" x1="90" y1="80" x2="1510" y2="80"/>
  <text class="kicker" x="800" y="145" text-anchor="middle">Beszélgetési szál · 6 egymásra épülő prompt</text>

  <!-- Vertical rail -->
  <line class="rule-soft" x1="165" y1="220" x2="165" y2="3070"/>

  <!-- Row 1 -->
  <text class="gutter-num" x="165" y="285" text-anchor="middle">1</text>
  <text class="gutter-label" x="165" y="328" text-anchor="middle">PROMPT</text>
  <line class="rule-soft" x1="190" y1="280" x2="230" y2="280"/>
  <rect class="box" x="230" y="190" width="1280" height="360"/>
  <line class="rule-soft-2" x1="266" y1="270" x2="1474" y2="270"/>
  <text class="msg-label" x="266" y="246">ÁLTALÁNOS PROMPT</text>
  <text class="msg-sub" x="1474" y="246" text-anchor="end">Profilalapú kiinduló prompt</text>
  <text class="msg-body" x="266" y="330">
    <tspan x="266" dy="0">“I am a [AGE: 25]-year-old [GENDER: Male], and I would like to travel</tspan>
    <tspan x="266" dy="40">[TRAVEL PARTY: with my partner] for [LENGTH OF STAY: 3 nights] to</tspan>
    <tspan x="266" dy="40">[DESTINATION: Lake Balaton]. Could you recommend activities in the area</tspan>
    <tspan x="266" dy="40">for us within a budget of [BUDGET: max. 100 EUR per day per person]?”</tspan>
  </text>

  <!-- seasonal marker -->
  <line class="rule-soft" x1="165" y1="620" x2="165" y2="690"/>
  <line class="rule-soft" x1="230" y1="655" x2="1510" y2="655"/>
  <text class="seasonal-label" x="246" y="640">Négy szezonális megkötés · azonos tematikai kategória (Wellness)</text>

  <!-- Row 2 -->
  <text class="gutter-num" x="165" y="795" text-anchor="middle">2</text>
  <text class="gutter-label" x="165" y="838" text-anchor="middle">PROMPT</text>
  <line class="rule-soft" x1="190" y1="790" x2="230" y2="790"/>
  <rect class="box-soft" x="230" y="700" width="1280" height="270"/>
  <line class="rule-soft-2" x1="266" y1="780" x2="1474" y2="780"/>
  <text class="msg-label" x="266" y="756">I. MEGKÖTÉSES PROMPT</text>
  <text class="msg-sub" x="1474" y="756" text-anchor="end">Wellness / Nyár</text>
  <text class="msg-body" x="266" y="840">
    <tspan x="266" dy="0">“I am particularly interested in massage salons, sauna world,</tspan>
    <tspan x="266" dy="40">relaxation, and spa hotels. Could you recommend 5 places in the</tspan>
    <tspan x="266" dy="40">area between June and August?”</tspan>
  </text>

  <!-- Row 3 -->
  <text class="gutter-num" x="165" y="1105" text-anchor="middle">3</text>
  <text class="gutter-label" x="165" y="1148" text-anchor="middle">PROMPT</text>
  <line class="rule-soft" x1="190" y1="1100" x2="230" y2="1100"/>
  <rect class="box-soft" x="230" y="1010" width="1280" height="270"/>
  <line class="rule-soft-2" x1="266" y1="1090" x2="1474" y2="1090"/>
  <text class="msg-label" x="266" y="1066">II. MEGKÖTÉSES PROMPT</text>
  <text class="msg-sub" x="1474" y="1066" text-anchor="end">Wellness / Ősz</text>
  <text class="msg-body" x="266" y="1150">
    <tspan x="266" dy="0">“I am particularly interested in massage salons, sauna world,</tspan>
    <tspan x="266" dy="40">relaxation, and spa hotels. Could you recommend 5 places in the</tspan>
    <tspan x="266" dy="40">area between September and November?”</tspan>
  </text>

  <!-- Row 4 -->
  <text class="gutter-num" x="165" y="1415" text-anchor="middle">4</text>
  <text class="gutter-label" x="165" y="1458" text-anchor="middle">PROMPT</text>
  <line class="rule-soft" x1="190" y1="1410" x2="230" y2="1410"/>
  <rect class="box-soft" x="230" y="1320" width="1280" height="270"/>
  <line class="rule-soft-2" x1="266" y1="1400" x2="1474" y2="1400"/>
  <text class="msg-label" x="266" y="1376">III. MEGKÖTÉSES PROMPT</text>
  <text class="msg-sub" x="1474" y="1376" text-anchor="end">Wellness / Tél</text>
  <text class="msg-body" x="266" y="1460">
    <tspan x="266" dy="0">“I am particularly interested in massage salons, sauna world,</tspan>
    <tspan x="266" dy="40">relaxation, and spa hotels. Could you recommend 5 places in the</tspan>
    <tspan x="266" dy="40">area between December and February?”</tspan>
  </text>

  <!-- Row 5 -->
  <text class="gutter-num" x="165" y="1725" text-anchor="middle">5</text>
  <text class="gutter-label" x="165" y="1768" text-anchor="middle">PROMPT</text>
  <line class="rule-soft" x1="190" y1="1720" x2="230" y2="1720"/>
  <rect class="box-soft" x="230" y="1630" width="1280" height="270"/>
  <line class="rule-soft-2" x1="266" y1="1710" x2="1474" y2="1710"/>
  <text class="msg-label" x="266" y="1686">IV. MEGKÖTÉSES PROMPT</text>
  <text class="msg-sub" x="1474" y="1686" text-anchor="end">Wellness / Tavasz</text>
  <text class="msg-body" x="266" y="1770">
    <tspan x="266" dy="0">“I am particularly interested in massage salons, sauna world,</tspan>
    <tspan x="266" dy="40">relaxation, and spa hotels. Could you recommend 5 places in the</tspan>
    <tspan x="266" dy="40">area between March and May?”</tspan>
  </text>

  <!-- Row 6 -->
  <text class="gutter-num" x="165" y="2105" text-anchor="middle">6</text>
  <text class="gutter-label" x="165" y="2148" text-anchor="middle">PROMPT</text>
  <line class="rule-soft" x1="190" y1="2100" x2="230" y2="2100"/>
  <rect class="box-tint" x="230" y="1970" width="1280" height="360"/>
  <line class="rule-soft-2" x1="266" y1="2050" x2="1474" y2="2050"/>
  <text class="msg-label" x="266" y="2026">ÖSSZEHASONLÍTÓ PROMPT</text>
  <text class="msg-sub" x="1474" y="2026" text-anchor="end">Desztinációk összehasonlítása azonos tematikai kategórián belül</text>
  <text class="msg-body" x="266" y="2110">
    <tspan x="266" dy="0">“Besides [DESTINATION: Lake Balaton], could you recommend five comparable</tspan>
    <tspan x="266" dy="40">lakeside destination regions in other European countries where the</tspan>
    <tspan x="266" dy="40">[THEMATIC GROUP: wellness] offer is particularly strong and also fits my</tspan>
    <tspan x="266" dy="40">profile and budget?”</tspan>
  </text>
</svg>
